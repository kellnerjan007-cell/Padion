name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  detect:
    name: Detect Change Type
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.check.outputs.needs_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if native rebuild needed
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE 'package\.json|package-lock\.json|app\.json|eas\.json'; then
            echo "needs_build=true" >> $GITHUB_OUTPUT
          else
            echo "needs_build=false" >> $GITHUB_OUTPUT
          fi

  ota-update:
    name: OTA Update
    needs: detect
    if: needs.detect.outputs.needs_build == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA Update
        run: eas update --branch production --platform ios --message "${{ github.event.head_commit.message }}"
        env:
          CI: "1"

  native-build:
    name: Build + Submit to TestFlight
    needs: detect
    if: needs.detect.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS + Submit to TestFlight
        run: eas build --platform ios --profile preview --non-interactive --auto-submit --clear-cache
